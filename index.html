<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#C0392B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Baba CPR">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>Csecsemő újraélesztés</title>
<style>
  :root {
    --red: #C0392B; --red-light: #E74C3C; --amber: #E67E22;
    --green: #27AE60; --bg: #0D0D0D; --surface: #1A1A1A;
    --surface2: #252525; --text: #F0F0F0; --muted: #888; --border: #333;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden;
  }

  /* START */
  #startScreen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 32px 24px; text-align: center; gap: 24px;
  }
  .emergency-badge {
    background: var(--red); color: white; font-size: 11px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; padding: 6px 16px; border-radius: 20px;
  }
  #startScreen h1 { font-size: 28px; font-weight: 800; line-height: 1.2; color: white; }
  #startScreen h1 span { color: var(--red-light); }
  #startScreen p { color: var(--muted); font-size: 15px; line-height: 1.6; max-width: 340px; }
  .btn-start {
    background: var(--red); color: white; font-size: 22px; font-weight: 800;
    border: none; border-radius: 16px; padding: 22px 48px; cursor: pointer;
    width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(192,57,43,0.5);
    animation: pulse-btn 2s infinite; transition: transform 0.1s;
  }
  .btn-start:active { transform: scale(0.97); }
  @keyframes pulse-btn {
    0%,100% { box-shadow: 0 8px 32px rgba(192,57,43,0.5); }
    50% { box-shadow: 0 8px 48px rgba(192,57,43,0.9); }
  }
  .call-hint {
    display: flex; align-items: center; gap: 10px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px; padding: 14px 20px; max-width: 360px; width: 100%;
  }
  .call-hint a { color: var(--amber); font-size: 20px; font-weight: 800; text-decoration: none; }
  .call-hint p { color: var(--muted); font-size: 13px; text-align: left; }
  .audio-note {
    font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px;
  }

  /* GUIDE SCREEN */
  #guideScreen { display: none; flex-direction: column; min-height: 100vh; }
  .progress-bar { height: 4px; background: var(--border); }
  .progress-fill { height: 100%; background: var(--red); transition: width 0.4s ease; }

  .guide-header {
    padding: 16px; display: flex; align-items: center;
    justify-content: space-between; border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .guide-step-num { font-size: 13px; color: var(--muted); font-weight: 600; letter-spacing: 1px; flex-shrink: 0; }
  .header-btns { display: flex; gap: 8px; align-items: center; }
  .btn-mute {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 18px; font-size: 28px; cursor: pointer;
    line-height: 1;
  }
  .btn-pause {
    background: var(--amber); color: white; border: none;
    border-radius: 14px; padding: 16px 18px; font-size: 18px; font-weight: 800; cursor: pointer;
    display: flex; align-items: center; gap: 6px; line-height: 1;
  }
  .btn-pause.paused {
    background: var(--green);
    animation: pulse-btn 1.5s infinite;
  }
  .btn-repeat-top {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 18px; font-size: 22px; cursor: pointer;
    line-height: 1;
  }
  .btn-call {
    background: var(--red); color: white; font-size: 20px; font-weight: 800;
    border: none; border-radius: 14px; padding: 16px 20px; cursor: pointer;
    text-decoration: none; display: flex; align-items: center; gap: 6px; line-height: 1;
  }

  .guide-main {
    flex: 1; padding: 28px 24px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 24px; text-align: center;
  }

  .big-emoji { font-size: 96px; }
  .big-emoji.cpr { animation: cpr-bounce 0.5s ease-in-out infinite; }
  @keyframes cpr-bounce {
    0%,100% { transform: translateY(0) scale(1); }
    40% { transform: translateY(-10px) scale(1.06); }
    60% { transform: translateY(5px) scale(0.96); }
  }
  .big-emoji.breath { animation: breath-pulse 2s ease-in-out infinite; }
  @keyframes breath-pulse {
    0%,100% { transform: scale(1); opacity: 0.75; }
    50% { transform: scale(1.18); opacity: 1; }
  }
  .big-emoji.check { animation: shake 3s ease-in-out infinite; }
  @keyframes shake {
    0%,80%,100% { transform: rotate(0); }
    10% { transform: rotate(-6deg); } 20% { transform: rotate(6deg); }
    30% { transform: rotate(-4deg); } 40% { transform: rotate(4deg); }
  }

  .guide-title { font-size: 26px; font-weight: 800; line-height: 1.25; color: white; }
  .guide-text { font-size: 17px; line-height: 1.6; color: #CCC; max-width: 360px; }
  .guide-text strong { color: white; }
  .guide-text .hl { color: var(--red-light); font-weight: 700; }

  /* Big count display (hands-free) */
  .live-count {
    font-size: 120px; font-weight: 900; color: white;
    font-variant-numeric: tabular-nums; line-height: 1; letter-spacing: -4px;
  }
  .live-count.flash { animation: countflash 0.25s; }
  @keyframes countflash {
    0% { color: var(--red-light); transform: scale(1.15); }
    100% { color: white; transform: scale(1); }
  }
  .live-sub { font-size: 18px; color: var(--muted); font-weight: 600; letter-spacing: 1px; }

  /* Beat ring */
  .beat-ring {
    width: 200px; height: 200px; border-radius: 50%;
    border: 5px solid var(--border); display: flex; align-items: center;
    justify-content: center; flex-direction: column; gap: 4px;
    transition: border-color 0.05s, box-shadow 0.05s, transform 0.05s;
  }
  .beat-ring.pulse {
    border-color: var(--red-light);
    box-shadow: 0 0 40px rgba(192,57,43,0.6);
    transform: scale(1.04);
  }
  .beat-ring.breath-ring.blow {
    border-color: var(--green);
    box-shadow: 0 0 40px rgba(39,174,96,0.5);
    transform: scale(1.08);
  }

  /* Countdown for "watch/listen" */
  .countdown-num {
    font-size: 110px; font-weight: 900; color: var(--red-light);
    font-variant-numeric: tabular-nums; line-height: 1;
  }

  .guide-actions { padding: 16px 20px 36px; display: flex; flex-direction: column; gap: 10px; position: relative; }
  .btn-primary {
    background: var(--red); color: white; border: none; border-radius: 16px;
    padding: 22px 0; font-size: 20px; font-weight: 800; cursor: pointer; width: 100%;
    box-shadow: 0 4px 20px rgba(192,57,43,0.4); transition: transform 0.1s;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary.green { background: var(--green); box-shadow: 0 4px 20px rgba(39,174,96,0.4); }
  .btn-secondary {
    background: var(--surface); color: var(--text); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 0; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%;
  }
  .btn-row { display: flex; gap: 10px; }
  .btn-row .btn-secondary { flex: 1; }
  .btn-skip-top {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 14px; font-size: 15px; font-weight: 700;
    cursor: pointer; line-height: 1;
  }

  .auto-hint {
    font-size: 13px; color: var(--muted); text-align: center; line-height: 1.5;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }

  .repeat-banner {
    background: rgba(192,57,43,0.12); border: 1px solid var(--red);
    border-radius: 12px; padding: 10px 16px; font-size: 14px; color: #EEE;
    text-align: center; line-height: 1.5; max-width: 360px;
  }
</style>
</head>
<body>

<!-- START -->
<div id="startScreen">
  <div class="emergency-badge">Vészhelyzet protokoll</div>
  <h1>A baba nem<br><span>lélegzik?</span></h1>
  <p>Tedd magad mellé a telefont. Az app <strong>felolvassa</strong> mit kell tenned, és <strong>hangosan számol</strong> az ütemmel. Te a babával foglalkozz.</p>
  <button class="btn-start" onclick="startApp()">INDÍTÁS – HANGOS INSTRUKCIÓKKAL</button>
  <div class="call-hint">
    <div style="font-size:28px;">📞</div>
    <div>
      <a href="tel:104">MENTŐK: 104</a>
      <p>Hívd amint tudod</p>
    </div>
  </div>
  <div class="audio-note">🔊 Kapcsold fel a hangerőt!</div>
</div>

<!-- GUIDE -->
<div id="guideScreen">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="guide-header">
    <div class="guide-step-num" id="stepNum">1 / 7</div>
    <div class="header-btns">
      <button class="btn-mute" id="muteBtn" onclick="toggleMute()" title="Elhalkítás">🔊</button>
      <button class="btn-repeat-top" onclick="repeatStep()" title="Újra">↺</button>
      <button class="btn-skip-top" onclick="skipStep()">Kihagy</button>
      <button class="btn-pause" id="pauseBtn" onclick="togglePause()" title="Szünet">⏸</button>
      <a href="tel:104" class="btn-call">📞 104</a>
    </div>
  </div>
  <div class="guide-main" id="guideMain"></div>
  <div class="guide-actions" id="guideActions"></div>
</div>

<script>
// ════════════════════════════════════════════════
// SPEECH – MP3 fájlok, fallback: Web Speech API
// ════════════════════════════════════════════════
let muted = false;
let paused = false;
let huVoice = null;
let currentAudio = null;

// MP3 cache – előtöltve induláskor
const audioCache = {};

const AUDIO_KEYS = [
  's1_check','s2_position','s3_listen','s3_result','s4_mouth',
  's4b_undress','s5_breaths','s6_compress',
  'loop_breath_1','loop_breath_n','loop_breath_swap',
  'loop_breath_mentok','loop_breath_technika',
  'loop_compress','loop_erot'
];

function preloadAudio() {
  AUDIO_KEYS.forEach(key => {
    const a = new Audio('audio/' + key + '.mp3');
    a.preload = 'auto';
    a.load();
    audioCache[key] = a;
  });
}

const AUDIO_MAP = {
  'Nem szabad megrázni a babát! ... Szólítsd meg hangosan. ... Nyomogasd a vállát. ... Csipd meg a talpát. ... Ha nem reagál, nyomd meg a gombot.': 's1_check',
  'Fektesd a babát hanyatt ... egy kemény felületre. ... Hívd a száznégyet, ... és tedd hangosbeszélőre. ... Aztán nyomd meg a tovább gombot.': 's2_position',
  'Hajolj a baba fölé. ... Tedd közel a füled az orrához. ... Hallgasd, hogy lélegzik-e. ... Nézd, hogy emelkedik-e a mellkasa. ... Érzed-e az arcodon a légzését.': 's3_listen',
  'Ha nem lélegzik, folytasd.': 's3_result',
  'Nézz bele a baba szájába. ... Ha látsz idegen testet, ... töröld ki egy ujjal, ruhával. ... Ne papírzsebkendőt használj, ... mert az szakad és málik. ... Ha nem látsz semmit, ne nyúlj bele.': 's4_mouth',
  'Vetkőztesd le a baba felsőtestét. ... Tedd szabaddá a mellkasát.': 's4b_undress',
  'Most öt befúvás következik. ... Hajtsd a fejét enyhén hátra. ... Kapd be a baba száját és orrát a száddal egyszerre. ... Fújj be hosszan. ... Figyeld, emelkedik a mellkasa?': 's5_breaths',
  'A két hüvelykujjadat tedd a mellbimbókat összekötő vonal alá, középre. ... A baba hátát fogd négy-négy ujjaddal. ... Nyomd erősen, ... préselődnie kell a vérnek. ... Figyeld a ritmust: ... másodpercenként kétszer nyomj.': 's6_compress',
  'Kezdődik az ismétlés. 2 befúvás.': 'loop_breath_1',
  '2 befúvás.': 'loop_breath_n',
  '2 befúvás. Ha elfáradsz, cseréljetek.': 'loop_breath_swap',
  '2 befúvás. Kitartás, a mentők úton vannak.': 'loop_breath_mentok',
  '2 befúvás. Szájon és orron egyszerre.': 'loop_breath_technika',
  'Ismét 30 mellkaskompresszió.': 'loop_compress',
  'Erősen préselj.': 'loop_erot',
};

function playMp3(key, cb) {
  if (muted || paused) { if (cb) cb(); return; }
  if (currentAudio) { try { currentAudio.pause(); } catch(e) {} currentAudio = null; }

  // Mindig új Audio objektum – a cache-elt nem játszható le újra megbízhatóan
  const audio = new Audio('audio/' + key + '.mp3');
  audio.preload = 'auto';
  currentAudio = audio;

  const onEnd = () => { currentAudio = null; if (cb) cb(); };
  const onErr = () => { currentAudio = null; speakTTSByKey(key, cb); };

  audio.addEventListener('ended', onEnd, { once: true });
  audio.addEventListener('error', onErr, { once: true });

  const p = audio.play();
  if (p && typeof p.then === 'function') {
    p.then(() => {}).catch(() => { onErr(); });
  }
}

// TTS fallback kulcs alapján (nem kell a teljes szöveg)
const KEY_TO_TEXT = {};
Object.entries(AUDIO_MAP).forEach(([text, key]) => { KEY_TO_TEXT[key] = text; });

function speakTTSByKey(key, cb) {
  const text = KEY_TO_TEXT[key] || key;
  speakTTS(text, 1.0, cb);
}

function speak(text, rate, cb) {
  if (muted || paused) { if (cb) cb(); return; }
  const key = AUDIO_MAP[text];
  if (key) { playMp3(key, cb); return; }
  speakTTS(text, rate, cb);
}

function speakTTS(text, rate, cb) {
  const clean = text.replace(/ \.\.\. /g, ' ').replace(/\.\.\./g, '').trim();
  if (!window.speechSynthesis) { if (cb) cb(); return; }
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(clean);
    u.lang = 'hu-HU';
    if (huVoice) u.voice = huVoice;
    u.rate = rate || 1.0;
    if (cb) u.onend = cb;
    speechSynthesis.speak(u);
  } catch(e) { if (cb) cb(); }
}

function speakNum(text) {
  if (muted || paused || !window.speechSynthesis) return;
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'hu-HU';
    if (huVoice) u.voice = huVoice;
    u.rate = 1.3;
    speechSynthesis.speak(u);
  } catch(e) {}
}

function loadVoice() {
  const voices = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  huVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('hu')) || null;
}
if (window.speechSynthesis) {
  loadVoice();
  speechSynthesis.onvoiceschanged = loadVoice;
}

function toggleMute() {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
  if (muted) {
    if (window.speechSynthesis) speechSynthesis.cancel();
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  }
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('pauseBtn');
  if (paused) {
    if (window.speechSynthesis) speechSynthesis.cancel();
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    breathCueRunning = false;
    activeTimers.forEach(t => { clearTimeout(t); clearInterval(t); });
    activeTimers = [];
    btn.textContent = '▶';
    btn.classList.add('paused');
  } else {
    // Resume – re-render current step or loop
    btn.textContent = '⏸';
    btn.classList.remove('paused');
    if (currentStep >= TOTAL_STEPS - 1) {
      runLoopCycle();
    } else {
      renderStep();
    }
  }
}

// ════════════════════════════════════════════════
// AUDIO + VIBRATION
// ════════════════════════════════════════════════
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playClick() {
  if (muted) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(900, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.04);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.07);
  } catch(e) {}
}
function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

// ════════════════════════════════════════════════
// FLOW DEFINITION
// Each step: spoken intro, visual, how it advances.
// ════════════════════════════════════════════════
let currentStep = 0;
let activeTimers = [];
let breathCueRunning = false;

function clearTimers() {
  activeTimers.forEach(t => { clearTimeout(t); clearInterval(t); });
  activeTimers = [];
  breathCueRunning = false;
  if (window.speechSynthesis) speechSynthesis.cancel();
}
function later(fn, ms) { const t = setTimeout(fn, ms); activeTimers.push(t); return t; }

const TOTAL_STEPS = 8;

function startApp() {
  getAudioCtx(); // unlock audio context
  preloadAudio(); // előtölt minden MP3-at user gesture-n belül
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('guideScreen').style.display = 'flex';
  currentStep = 0;
  renderStep();
}

function setProgress(n) {
  document.getElementById('progressFill').style.width = (n / TOTAL_STEPS * 100) + '%';
  document.getElementById('stepNum').textContent = n + ' / ' + TOTAL_STEPS;
}

// ════════════════════════════════════════════════
// STEP RENDERING
// ════════════════════════════════════════════════
function renderStep() {
  clearTimers();
  const main = document.getElementById('guideMain');
  const actions = document.getElementById('guideActions');

  switch (currentStep) {

    // ── 1. CHECK RESPONSE ──
    case 0:
      setProgress(1);
      main.innerHTML = `
        <div class="big-emoji check">👁️</div>
        <div class="guide-title">Nézd meg reagál-e<br>a baba!</div>
        <div class="guide-text"><span class="hl">Nem szabad megrázni!</span> Szólítsd meg <strong>hangosan</strong>, <strong>nyomogasd a vállát</strong> és <strong>csipd meg a talpát</strong>.</div>`;
      actions.innerHTML = `
        <button class="btn-primary" onclick="nextStep()">Nem reagál →</button>
        <div class="auto-hint" style="font-size:16px; color: var(--text);">Ha reagál és lélegzik, fordítsd az oldalára</div>`;
      speak('Nem szabad megrázni a babát! ... Szólítsd meg hangosan. ... Nyomogasd a vállát. ... Csipd meg a talpát. ... Ha nem reagál, nyomd meg a gombot.', 1.0);
      break;

    // ── 2. POSITION + CALL ──
    case 1:
      setProgress(2);
      main.innerHTML = `
        <div class="big-emoji">📍</div>
        <div class="guide-title">Fektesd kemény<br>felületre + hívd a mentőt</div>
        <div class="guide-text">Tedd a babát <strong>hanyatt</strong> a padlóra vagy asztalra. <strong>Hívd a 1‑0‑4‑et</strong> most – tedd hangosbeszélőre!</div>`;
      actions.innerHTML = `
        <a href="tel:104" class="btn-primary" style="text-decoration:none;display:block;text-align:center">📞 MENTŐK HÍVÁSA – 104</a>
        <button class="btn-secondary" onclick="nextStep()">Kész, tovább →</button>`;
      speak('Fektesd a babát hanyatt ... egy kemény felületre. ... Hívd a száznégyet, ... és tedd hangosbeszélőre. ... Aztán nyomd meg a tovább gombot.', 1.0);
      break;

    // ── 3. LOOK / LISTEN 10s ──
    case 2:
      setProgress(3);
      main.innerHTML = `
        <div class="big-emoji check">👂</div>
        <div class="guide-title">Nézd és hallgasd<br>10 másodpercig</div>
        <div class="countdown-num" id="cd">10</div>
        <div class="guide-text">Tedd közel a <strong>füled az orrához</strong> · hallgasd a légzést · nézd a mellkasát · érzed-e az arcadon a levegőt?</div>`;
      actions.innerHTML = `
        <button class="btn-secondary" onclick="clearTimers(); nextStep()">Tovább →</button>`;
      speak('Hajolj a baba fölé. ... Tedd közel a füled az orrához. ... Hallgasd, hogy lélegzik-e. ... Nézd, hogy emelkedik-e a mellkasa. ... Érzed-e az arcodon a légzését.', 1.0);
      later(() => {
        runCountdown(10, 'cd', () => {
          speak('Ha nem lélegzik, folytasd.', 1.0, () => later(nextStep, 600));
        });
      }, 3500);
      if (muted || !window.speechSynthesis) later(() => runCountdown(10, 'cd', () => later(nextStep, 600)), 500);
      break;

    // ── 4. CHECK MOUTH ──
    case 3:
      setProgress(4);
      main.innerHTML = `
        <div class="big-emoji check">👄</div>
        <div class="guide-title">Nézz bele a szájába</div>
        <div class="guide-text">Ha <strong>látsz idegen testet</strong>, töröld ki egy ujjal, <strong>ruhával</strong> – <span class="hl">ne papírzsebkendővel, mert az szakad és málik!</span> Ha nem látsz semmit, ne nyúlj bele.</div>`;
      actions.innerHTML = `<button class="btn-primary" onclick="nextStep()">Szabad a légút →</button>`;
      speak('Nézz bele a baba szájába. ... Ha látsz idegen testet, ... töröld ki egy ujjal, ruhával. ... Ne papírzsebkendőt használj, ... mert az szakad és málik. ... Ha nem látsz semmit, ne nyúlj bele.', 1.0, () => {
        later(nextStep, 3000);
      });
      if (muted || !window.speechSynthesis) later(nextStep, 5000);
      break;

    // ── 4b. UNDRESS CHEST ──
    case 4:
      setProgress(5);
      main.innerHTML = `
        <div class="big-emoji">👕</div>
        <div class="guide-title">Vetkőztesd le<br>a felsőtestét!</div>
        <div class="guide-text">Tedd <strong>szabaddá a mellkasát</strong> – vedd le vagy húzd fel a ruháját.</div>`;
      actions.innerHTML = `<button class="btn-primary" onclick="nextStep()">Szabad a mellkas →</button>`;
      speak('Vetkőztesd le a baba felsőtestét. ... Tedd szabaddá a mellkasát.', 1.0, () => {
        later(nextStep, 4000);
      });
      if (muted || !window.speechSynthesis) later(nextStep, 6000);
      break;

    // ── 5. INITIAL 5 BREATHS ──
    case 5:
      setProgress(6);
      main.innerHTML = `
        <div class="beat-ring breath-ring" id="breathRing">
          <div style="font-size:56px">🫁</div>
        </div>
        <div class="guide-title" style="font-size:22px">5 kezdő befúvás</div>
        <div class="guide-text">Kapd be a <strong>száját és orrát</strong> egyszerre. Fújj be <strong>hosszan</strong> – figyeld, hogy a mellkas <strong>megemelkedik-e</strong>. Ismételd ötször.</div>`;
      actions.innerHTML = `<div class="auto-hint">🫁 Automatikusan folytatódik</div>`;
      speak('Most öt befúvás következik. ... Hajtsd a fejét enyhén hátra. ... Kapd be a baba száját és orrát a száddal egyszerre. ... Fújj be hosszan. ... Figyeld, emelkedik a mellkasa?', 1.0, () => {
        runBreathCue5(() => later(nextStep, 600));
      });
      if (muted || !window.speechSynthesis) later(() => runBreathCue5(() => later(nextStep, 600)), 500);
      break;

    // ── 6. FIRST 30 COMPRESSIONS ──
    case 6:
      setProgress(7);
      main.innerHTML = `
        <div class="beat-ring" id="beatRing">
          <div class="live-count" id="compCount">0</div>
          <div class="live-sub">/ 30</div>
        </div>
        <div class="guide-title" style="font-size:22px">30 mellkaskompresszió</div>
        <div class="guide-text">A két <strong>hüvelykujjad</strong> a mellbimbók vonala alá, középre. A baba hátát <strong>4-4 ujjal fogd</strong>. Nyomd erősen, préselődnie kell a vérnek. Figyeld a ritmust: <strong>másodpercenként kétszer nyomj</strong> – számolunk.</div>`;
      actions.innerHTML = `<div class="auto-hint">🤲 Nyomd a kattanás ütemére</div>`;
      speak('A két hüvelykujjadat tedd a mellbimbókat összekötő vonal alá, középre. ... A baba hátát fogd négy-négy ujjaddal. ... Nyomd erősen, ... préselődnie kell a vérnek. ... Figyeld a ritmust: ... másodpercenként kétszer nyomj.', 1.0, () => {
        runCompressions(30, () => later(nextStep, 400));
      });
      if (muted || !window.speechSynthesis) later(() => runCompressions(30, () => later(nextStep, 400)), 500);
      break;

    // ── 7. CONTINUOUS LOOP: 2 breaths + 30 compressions ──
    case 7:
      setProgress(8);
      runLoopCycle();
      break;
  }
}

function nextStep() {
  clearTimers();
  if (currentStep < TOTAL_STEPS - 1) { currentStep++; renderStep(); }
}

function skipStep() {
  clearTimers();
  breathCueRunning = false;
  if (currentStep >= TOTAL_STEPS - 1) {
    // In loop: skip to next phase
    if (loopPhase === 'breath') {
      loopCompressionsPhase();
    } else {
      runLoopCycle();
    }
  } else {
    currentStep++;
    renderStep();
  }
}

function repeatStep() {
  clearTimers();
  breathCueRunning = false;
  if (currentStep >= TOTAL_STEPS - 1) {
    loopCycleNum = Math.max(0, loopCycleNum - 1);
    runLoopCycle();
  } else {
    renderStep();
  }
}

function prevStep() {
  clearTimers();
  if (currentStep > 0) { currentStep--; renderStep(); }
}

// ════════════════════════════════════════════════
// COUNTDOWN (look/listen) – speaks every number
// ════════════════════════════════════════════════
function runCountdown(from, elId, done) {
  let n = from;
  const el = document.getElementById(elId);
  if (el) el.textContent = n;
  const iv = setInterval(() => {
    n--;
    const e = document.getElementById(elId);
    if (e) e.textContent = n > 0 ? n : '✓';
    if (n <= 3 && n > 0) { playClick(); }
    if (n <= 0) { clearInterval(iv); if (done) done(); }
  }, 1000);
  activeTimers.push(iv);
}

// Voiced countdown: speaks each number aloud
function runCountdownVoice(from, elId, done) {
  let n = from;
  const el = document.getElementById(elId);
  if (el) el.textContent = n;
  function tick() {
    if (n <= 0) {
      const e = document.getElementById(elId);
      if (e) e.textContent = '✓';
      if (done) done();
      return;
    }
    speakNum(String(n));
    playClick();
    const e = document.getElementById(elId);
    if (e) e.textContent = n;
    n--;
    const t = later(tick, 1000);
  }
  tick();
}

// Breath cue loop – 2 blow signals only (for loop cycles)
function runBreathCue() {
  breathCueRunning = true;
  let cueCount = 0;
  function oneCue() {
    if (!breathCueRunning) return;
    if (cueCount >= 2) return;
    cueCount++;
    const ring = document.getElementById('breathRing');
    if (ring) ring.classList.add('blow');
    playBlow();
    vibrate(900);
    const t1 = later(() => { const r = document.getElementById('breathRing'); if (r) r.classList.remove('blow'); }, 1200);
    if (cueCount < 2) later(oneCue, 2800);
  }
  oneCue();
}

// 5 breath cues for initial sequence, then calls done
function runBreathCue5(done) {
  breathCueRunning = true;
  let cueCount = 0;
  function oneCue() {
    if (!breathCueRunning) { if (done) done(); return; }
    if (cueCount >= 5) { if (done) done(); return; }
    cueCount++;
    const ring = document.getElementById('breathRing');
    if (ring) ring.classList.add('blow');
    playBlow();
    vibrate(900);
    later(() => { const r = document.getElementById('breathRing'); if (r) r.classList.remove('blow'); }, 1200);
    later(oneCue, 2800);
  }
  oneCue();
}


// ════════════════════════════════════════════════
// BREATHS (timed, with voice cue + blow sound)
// ════════════════════════════════════════════════
function runBreaths(total, done) {
  let count = 0;
  function oneBreath() {
    if (count >= total) { if (done) done(); return; }
    count++;
    const ring = document.getElementById('breathRing');
    const cnt = document.getElementById('breathCount');
    if (ring) ring.classList.add('blow');
    if (cnt) cnt.textContent = count;
    playBlow();
    vibrate(800);
    speakNum('Fújj');
    // blow lasts ~1s, pause ~1.2s
    later(() => { if (ring) ring.classList.remove('blow'); }, 1000);
    later(oneBreath, 2200);
  }
  oneBreath();
}

function playBlow() {
  if (muted) return;
  try {
    const ctx = getAudioCtx();
    const bufSize = ctx.sampleRate * 1.0;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 850; bp.Q.value = 0.5;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.35, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.35, ctx.currentTime + 0.7);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 1.0);
    src.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
    src.start(ctx.currentTime); src.stop(ctx.currentTime + 1.0);
  } catch(e) {}
}

// ════════════════════════════════════════════════
// COMPRESSIONS (120 BPM auto, counts aloud)
// ════════════════════════════════════════════════
function runCompressions(total, done) {
  let count = 0;
  const ring = document.getElementById('beatRing');
  const cnt = document.getElementById('compCount');
  const iv = setInterval(() => {
    count++;
    if (cnt) { cnt.textContent = count; cnt.classList.remove('flash'); void cnt.offsetWidth; cnt.classList.add('flash'); }
    if (ring) { ring.classList.add('pulse'); setTimeout(() => ring && ring.classList.remove('pulse'), 120); }
    playClick();
    vibrate(50);
    if (count % 5 === 0 || count === total) speakNum(String(count));
    if (count >= total) { clearInterval(iv); if (done) done(); }
  }, 500); // 120 BPM
  activeTimers.push(iv);
}

// ════════════════════════════════════════════════
// CONTINUOUS LOOP
// ════════════════════════════════════════════════
let loopCycleNum = 0;
let encourageIdx = 0;
let loopPhase = 'breath'; // 'breath' | 'compress'

function getBreathReminder() {
  // Alternate between two breath reminders each cycle
  if (loopCycleNum % 2 === 0) {
    return 'Kapd be a baba orrát és száját egyszerre. ... Fújj be hosszan. ... Ha emelkedik a mellkas, jó helyen vagy.';
  } else {
    return 'Szájon és orron egyszerre fújj. ... Nézd hogy a mellkas emelkedik-e.';
  }
}

function getCompressReminder() {
  // Every 5th cycle: mentő reminder
  if (loopCycleNum % 5 === 0) {
    return 'A mentők úton vannak. ... Kitartás, jól csinálod!';
  }
  // Every 9th cycle: csere reminder
  if (loopCycleNum % 9 === 0) {
    return 'Ha elfáradsz és van mellette valaki, ... cseréljetek. ... Az ajtót is nyissátok ki a mentőknek.';
  }
  // Every cycle: technique reminder, alternating
  if (loopCycleNum % 2 === 0) {
    return 'A két hüvelykujj a mellbimbókat összekötő vonal alá, középre. ... A többi ujjal fogd a hátát, és erősen préselj.';
  } else {
    return 'Ne aggódj a bordák miatt. ... A legfontosabb hogy a vér áramoljon. ... Erősen nyomj.';
  }
}

function runLoopCycle() {
  loopCycleNum++;
  loopPhase = 'breath';
  const main = document.getElementById('guideMain');
  const actions = document.getElementById('guideActions');

  main.innerHTML = `
    <div class="repeat-banner">🔁 ${loopCycleNum}. ciklus · folytasd amíg a mentő megérkezik</div>
    <div class="beat-ring breath-ring" id="breathRing">
      <div style="font-size:56px">🫁</div>
    </div>
    <div class="guide-title" style="font-size:22px">2 befúvás</div>
    <div class="guide-text">Kapd be a száját és orrát, fújj be <strong>hosszan</strong> – figyeld hogy a mellkas emelkedik.</div>`;
  actions.innerHTML = `<div class="auto-hint">🫁 2 befúvás · automatikusan folytatódik</div>`;

  // 2 breath cues with 3s initial wait, then auto-advance after 10s
  later(runBreathCue, 3000);

  if (loopCycleNum === 1) {
    speak('Kezdődik az ismétlés. 2 befúvás.', 1.1);
  } else if (loopCycleNum % 9 === 0) {
    speak('2 befúvás. Ha elfáradsz, cseréljetek.', 1.1);
  } else if (loopCycleNum % 5 === 0) {
    speak('2 befúvás. Kitartás, a mentők úton vannak.', 1.1);
  } else if (loopCycleNum % 2 === 0) {
    speak('2 befúvás. Szájon és orron egyszerre.', 1.1);
  } else {
    speak('2 befúvás.', 1.1);
  }

  // Auto-advance after 10s
  later(() => {
    breathCueRunning = false;
    loopCompressionsPhase();
  }, 10000);
}

function skipToCompressions() {
  breathCueRunning = false;
  clearTimers();
  loopCompressionsPhase();
}

function loopCompressionsPhase() {
  clearTimers();
  loopPhase = 'compress';
  const main = document.getElementById('guideMain');
  const actions = document.getElementById('guideActions');

  main.innerHTML = `
    <div class="repeat-banner">🔁 ${loopCycleNum}. ciklus · folytasd amíg a mentő megérkezik</div>
    <div class="beat-ring" id="beatRing">
      <div class="live-count" id="compCount">0</div>
      <div class="live-sub">/ 30</div>
    </div>
    <div class="guide-title" style="font-size:22px">30 mellkaskompresszió</div>
    <div class="guide-text">A két <strong>hüvelykujjad</strong> a mellbimbók vonala alá, középre. A baba hátát <strong>4-4 ujjal fogd</strong>. Nyomd erősen, préselődnie kell a vérnek. <strong>Másodpercenként kétszer</strong> – számolunk.</div>`;
  actions.innerHTML = `<div class="auto-hint">🤲 Az app számol · ne állj meg!</div>`;

  speak('Ismét 30 mellkaskompresszió.', 1.1);

  // 3s delay before compressions start – time to get back into position
  later(() => {
    runCompressionsLoop(30, () => {
      later(runLoopCycle, 400);
    });
  }, 3000);

  if (loopCycleNum % 2 !== 0 && loopCycleNum % 5 !== 0) {
    later(() => speak('Erősen préselj.', 1.1), 11000);
  }
}

// Loop-specific compression: skip 5 and 10, speak from 15 onwards at every 5
function runCompressionsLoop(total, done) {
  let count = 0;
  const ring = document.getElementById('beatRing');
  const cnt = document.getElementById('compCount');
  const iv = setInterval(() => {
    count++;
    if (cnt) { cnt.textContent = count; cnt.classList.remove('flash'); void cnt.offsetWidth; cnt.classList.add('flash'); }
    if (ring) { ring.classList.add('pulse'); setTimeout(() => ring && ring.classList.remove('pulse'), 120); }
    playClick();
    vibrate(50);
    if (count >= 15 && count % 5 === 0) speakNum(String(count));
    if (count >= total) { clearInterval(iv); if (done) done(); }
  }, 500);
  activeTimers.push(iv);
}
